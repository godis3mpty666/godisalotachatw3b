name: Python check

on:
  push:
  pull_request:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Compile Python sources
        run: python -m compileall -q godisalotachat plugins server run_webbased.py
